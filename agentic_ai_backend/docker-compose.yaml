services:
  api-gateway:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - ORCHESTRATOR_AGENT_URL=http://orchestrator-agent:8002
      - ORCHESTRATOR_AGENT_WS_URL=ws://orchestrator-agent:8002/ws
      - CONVERSATION_AGENT_URL=http://conversation-agent:8000
      - FORM_SUPPORT_AGENT_URL=http://formsupport-agent:8001
      - API_AUTH_REDIS_HOST=redis
      - API_AUTH_REDIS_PORT=6379
      - API_AUTH_REDIS_DB=1
      - "API_AUTH_REDIS_KEY_PREFIX=client_config:"
    depends_on:
      - orchestrator-agent
      - conversation-agent
      - formsupport-agent
      - redis
    restart: unless-stopped

  conversation-agent:
    build:
      context: ./agents
      dockerfile: conversationagent/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./agents/conversationagent/.env
    restart: unless-stopped

  formsupport-agent:
    build:
      context: .
      dockerfile: agents/formsupportagent/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./agents/formsupportagent/.env
    restart: unless-stopped

  orchestrator-agent:
    build:
      context: .
      dockerfile: agents/orchestrators/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ./agents/orchestrators/.env
    environment:
      - CONVERSATION_AGENT_A2A_URL=http://conversation-agent:8000
      - FORM_SUPPORT_AGENT_A2A_URL=http://formsupport-agent:8001
    depends_on:
      - conversation-agent
      - formsupport-agent
      - redis

  redis:
    image: redis:7.4 #use this same version on Azure Redis instance as well. PR review comment.
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data

