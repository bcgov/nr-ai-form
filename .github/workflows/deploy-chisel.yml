name: Deploy Chisel Server to Azure App Service

on:
  push:
    branches:
      - master
    paths:
      - 'infra/modules/chisel-server/**'
      - '.github/workflows/deploy-chisel.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'infra/modules/chisel-server/**'
      - '.github/workflows/deploy-chisel.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      terraform_action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: 1.12.2
  WORKDIR: .ci/chisel-server
  ENVIRONMENT: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') && 'prod' || github.event.inputs.environment || 'dev' }}
  AZURE_REGION: ${{ vars.AZURE_REGION || 'Canada Central' }}

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Chisel Terraform
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infra/modules/chisel-server -no-color

      - name: Generate Terraform Root
        shell: bash
        run: |
          mkdir -p "${WORKDIR}"
          cat > "${WORKDIR}/main.tf" <<'EOF'
          terraform {
            required_version = ">= 1.5.0"
            required_providers {
              azurerm = {
                source  = "hashicorp/azurerm"
                version = ">= 4.0.0"
              }
            }
            backend "azurerm" {}
          }

          provider "azurerm" {
            features {}
            subscription_id = var.subscription_id
            tenant_id       = var.tenant_id
            use_oidc        = true
          }

          module "chisel_server" {
            source = "../../infra/modules/chisel-server"

            app_name            = var.app_name
            environment         = var.environment
            location            = var.location
            resource_group_name = var.resource_group_name
            chisel_server_auth  = var.chisel_server_auth
            common_tags         = var.common_tags
          }

          variable "subscription_id" {
            type = string
          }

          variable "tenant_id" {
            type = string
          }

          variable "app_name" {
            type = string
          }

          variable "environment" {
            type = string
          }

          variable "location" {
            type = string
          }

          variable "resource_group_name" {
            type = string
          }

          variable "chisel_server_auth" {
            type      = string
            sensitive = true
          }

          variable "common_tags" {
            type = map(string)
          }

          output "chisel_server_url" {
            value = module.chisel_server.chisel_server_url
          }
          EOF

      - name: Terraform Init (modules only)
        working-directory: ${{ env.WORKDIR }}
        run: terraform init -backend=false -no-color

      - name: Terraform Validate
        working-directory: ${{ env.WORKDIR }}
        run: terraform validate -no-color

  plan:
    name: Terraform Plan
    runs-on: ubuntu-24.04
    needs: validate
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate Terraform Root
        shell: bash
        run: |
          mkdir -p "${WORKDIR}"
          cat > "${WORKDIR}/main.tf" <<'EOF'
          terraform {
            required_version = ">= 1.5.0"
            required_providers {
              azurerm = {
                source  = "hashicorp/azurerm"
                version = ">= 4.0.0"
              }
            }
            backend "azurerm" {}
          }

          provider "azurerm" {
            features {}
            subscription_id = var.subscription_id
            tenant_id       = var.tenant_id
            use_oidc        = true
          }

          module "chisel_server" {
            source = "../../infra/modules/chisel-server"

            app_name            = var.app_name
            environment         = var.environment
            location            = var.location
            resource_group_name = var.resource_group_name
            chisel_server_auth  = var.chisel_server_auth
            common_tags         = var.common_tags
          }

          variable "subscription_id" { type = string }
          variable "tenant_id" { type = string }
          variable "app_name" { type = string }
          variable "environment" { type = string }
          variable "location" { type = string }
          variable "resource_group_name" { type = string }
          variable "chisel_server_auth" { type = string, sensitive = true }
          variable "common_tags" { type = map(string) }
          output "chisel_server_url" { value = module.chisel_server.chisel_server_url }
          EOF

      - name: Terraform Init
        working-directory: ${{ env.WORKDIR }}
        run: |
          terraform init \
            -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -backend-config="resource_group_name=${{ secrets.TERRAFORM_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TERRAFORM_BACKEND_SA }}" \
            -backend-config="container_name=${{ secrets.TERRAFORM_BACKEND_CONTAINER }}" \
            -backend-config="key=chisel-appservice-${{ env.ENVIRONMENT }}.tfstate" \
            -no-color

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKDIR }}
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_app_name: ${{ github.event.repository.name }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_location: ${{ env.AZURE_REGION }}
          TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
          TF_VAR_common_tags: '{"ManagedBy":"Terraform","Environment":"${{ env.ENVIRONMENT }}","Component":"chisel-server"}'
          CHISEL_SERVER_AUTH: ${{ secrets.CHISEL_SERVER_AUTH }}
          CHISEL_PASSWORD: ${{ secrets.CHISEL_PASSWORD }}
        run: |
          AUTH_VALUE="${CHISEL_SERVER_AUTH}"
          if [ -z "${AUTH_VALUE}" ]; then
            AUTH_VALUE="${CHISEL_PASSWORD}"
          fi
          if [ -z "${AUTH_VALUE}" ]; then
            echo "::error::Missing CHISEL_SERVER_AUTH or CHISEL_PASSWORD secret"
            exit 1
          fi
          if [[ "${AUTH_VALUE}" != *":"* ]]; then
            AUTH_VALUE="tunnel:${AUTH_VALUE}"
          fi
          export TF_VAR_chisel_server_auth="${AUTH_VALUE}"

          terraform plan -out=tfplan -no-color > plan_output.txt
          cat plan_output.txt

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('${{ env.WORKDIR }}/plan_output.txt', 'utf8');
            const body = `## Terraform Plan - Chisel Server\n\n\`\`\`terraform\n${out.substring(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  apply:
    name: Terraform Apply
    runs-on: ubuntu-24.04
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'apply')
    environment: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') && 'prod' || github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate Terraform Root
        shell: bash
        run: |
          mkdir -p "${WORKDIR}"
          cat > "${WORKDIR}/main.tf" <<'EOF'
          terraform {
            required_version = ">= 1.5.0"
            required_providers {
              azurerm = {
                source  = "hashicorp/azurerm"
                version = ">= 4.0.0"
              }
            }
            backend "azurerm" {}
          }

          provider "azurerm" {
            features {}
            subscription_id = var.subscription_id
            tenant_id       = var.tenant_id
            use_oidc        = true
          }

          module "chisel_server" {
            source = "../../infra/modules/chisel-server"

            app_name            = var.app_name
            environment         = var.environment
            location            = var.location
            resource_group_name = var.resource_group_name
            chisel_server_auth  = var.chisel_server_auth
            common_tags         = var.common_tags
          }

          variable "subscription_id" { type = string }
          variable "tenant_id" { type = string }
          variable "app_name" { type = string }
          variable "environment" { type = string }
          variable "location" { type = string }
          variable "resource_group_name" { type = string }
          variable "chisel_server_auth" { type = string, sensitive = true }
          variable "common_tags" { type = map(string) }
          output "chisel_server_url" { value = module.chisel_server.chisel_server_url }
          EOF

      - name: Terraform Init
        working-directory: ${{ env.WORKDIR }}
        run: |
          terraform init \
            -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -backend-config="resource_group_name=${{ secrets.TERRAFORM_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TERRAFORM_BACKEND_SA }}" \
            -backend-config="container_name=${{ secrets.TERRAFORM_BACKEND_CONTAINER }}" \
            -backend-config="key=chisel-appservice-${{ env.ENVIRONMENT }}.tfstate" \
            -no-color

      - name: Terraform Plan
        working-directory: ${{ env.WORKDIR }}
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_app_name: ${{ github.event.repository.name }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_location: ${{ env.AZURE_REGION }}
          TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
          TF_VAR_common_tags: '{"ManagedBy":"Terraform","Environment":"${{ env.ENVIRONMENT }}","Component":"chisel-server"}'
          CHISEL_SERVER_AUTH: ${{ secrets.CHISEL_SERVER_AUTH }}
          CHISEL_PASSWORD: ${{ secrets.CHISEL_PASSWORD }}
        run: |
          AUTH_VALUE="${CHISEL_SERVER_AUTH}"
          if [ -z "${AUTH_VALUE}" ]; then
            AUTH_VALUE="${CHISEL_PASSWORD}"
          fi
          if [ -z "${AUTH_VALUE}" ]; then
            echo "::error::Missing CHISEL_SERVER_AUTH or CHISEL_PASSWORD secret"
            exit 1
          fi
          if [[ "${AUTH_VALUE}" != *":"* ]]; then
            AUTH_VALUE="tunnel:${AUTH_VALUE}"
          fi
          export TF_VAR_chisel_server_auth="${AUTH_VALUE}"

          terraform plan -out=tfplan -no-color

      - name: Terraform Apply
        working-directory: ${{ env.WORKDIR }}
        run: terraform apply -auto-approve tfplan -no-color

      - name: Get Outputs
        id: outputs
        working-directory: ${{ env.WORKDIR }}
        run: echo "chisel_server_url=$(terraform output -raw chisel_server_url)" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "Chisel Server deployed: ${{ steps.outputs.outputs.chisel_server_url }}"

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-24.04
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'destroy'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate Terraform Root
        shell: bash
        run: |
          mkdir -p "${WORKDIR}"
          cat > "${WORKDIR}/main.tf" <<'EOF'
          terraform {
            required_version = ">= 1.5.0"
            required_providers {
              azurerm = {
                source  = "hashicorp/azurerm"
                version = ">= 4.0.0"
              }
            }
            backend "azurerm" {}
          }

          provider "azurerm" {
            features {}
            subscription_id = var.subscription_id
            tenant_id       = var.tenant_id
            use_oidc        = true
          }

          module "chisel_server" {
            source = "../../infra/modules/chisel-server"

            app_name            = var.app_name
            environment         = var.environment
            location            = var.location
            resource_group_name = var.resource_group_name
            chisel_server_auth  = var.chisel_server_auth
            common_tags         = var.common_tags
          }

          variable "subscription_id" { type = string }
          variable "tenant_id" { type = string }
          variable "app_name" { type = string }
          variable "environment" { type = string }
          variable "location" { type = string }
          variable "resource_group_name" { type = string }
          variable "chisel_server_auth" { type = string, sensitive = true }
          variable "common_tags" { type = map(string) }
          EOF

      - name: Terraform Init
        working-directory: ${{ env.WORKDIR }}
        run: |
          terraform init \
            -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -backend-config="resource_group_name=${{ secrets.TERRAFORM_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TERRAFORM_BACKEND_SA }}" \
            -backend-config="container_name=${{ secrets.TERRAFORM_BACKEND_CONTAINER }}" \
            -backend-config="key=chisel-appservice-${{ env.ENVIRONMENT }}.tfstate" \
            -no-color

      - name: Terraform Destroy
        working-directory: ${{ env.WORKDIR }}
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_app_name: ${{ github.event.repository.name }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_location: ${{ env.AZURE_REGION }}
          TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
          TF_VAR_common_tags: '{"ManagedBy":"Terraform","Environment":"${{ env.ENVIRONMENT }}","Component":"chisel-server"}'
          CHISEL_SERVER_AUTH: ${{ secrets.CHISEL_SERVER_AUTH }}
          CHISEL_PASSWORD: ${{ secrets.CHISEL_PASSWORD }}
        run: |
          AUTH_VALUE="${CHISEL_SERVER_AUTH}"
          if [ -z "${AUTH_VALUE}" ]; then
            AUTH_VALUE="${CHISEL_PASSWORD}"
          fi
          if [ -z "${AUTH_VALUE}" ]; then
            echo "::error::Missing CHISEL_SERVER_AUTH or CHISEL_PASSWORD secret"
            exit 1
          fi
          if [[ "${AUTH_VALUE}" != *":"* ]]; then
            AUTH_VALUE="tunnel:${AUTH_VALUE}"
          fi
          export TF_VAR_chisel_server_auth="${AUTH_VALUE}"

          terraform destroy -auto-approve -no-color
