name: Deploy VM + Bastion (ALZ)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (must match a GitHub Environment + OIDC federated credential)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
          - tools
      terraform_command:
        description: 'Terraform command to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read

jobs:
  deploy:
    name: Deploy Bastion + Jumpbox (${{ inputs.environment }})
    runs-on: ubuntu-24.04
    # Environment must be set on the JOB so environment-scoped secrets resolve
    # and OIDC trusts the job with subject: repo:...:environment:<env>
    environment: ${{ inputs.environment }}
    steps:
      # Required so the action can read tfvars_file from this repo
      - uses: actions/checkout@v4

      - name: Validate required environment configuration
        env:
          STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          VNET_NAME: ${{ secrets.VNET_NAME }}
          VNET_RESOURCE_GROUP_NAME: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          VNET_ADDRESS_SPACE: ${{ secrets.VNET_ADDRESS_SPACE }}
          BASTION_SUBNET_ADDRESS_PREFIX: ${{ secrets.BASTION_SUBNET_ADDRESS_PREFIX }}
          JUMPBOX_SUBNET_ADDRESS_PREFIX: ${{ secrets.JUMPBOX_SUBNET_ADDRESS_PREFIX }}
          VM_ADMIN_LOGIN_PRINCIPAL_IDS: ${{ secrets.VM_ADMIN_LOGIN_PRINCIPAL_IDS }}
        run: |
          missing=()
          required=(
            STORAGE_ACCOUNT_NAME
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            VNET_NAME
            VNET_RESOURCE_GROUP_NAME
            VNET_ADDRESS_SPACE
            BASTION_SUBNET_ADDRESS_PREFIX
            JUMPBOX_SUBNET_ADDRESS_PREFIX
            VM_ADMIN_LOGIN_PRINCIPAL_IDS
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub Environment configuration for '${{ inputs.environment }}': ${missing[*]}"
            echo "::error::Go to Settings > Environments > ${{ inputs.environment }} and add the missing secrets/vars."
            exit 1
          fi

      - uses: bcgov/action-deployer-vm-bastion-alz@b7053b77b6030a98909ad12182f588ad4302c0a2
        with:
          app_name: nr-ai-form
          app_env: ${{ inputs.environment }}
          terraform_command: ${{ inputs.terraform_command }}

          backend_storage_account: ${{ vars.STORAGE_ACCOUNT_NAME }}

          # Azure OIDC identity (environment-scoped secrets)
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Network details — always passed from secrets, never plain text
          vnet_name: ${{ secrets.VNET_NAME }}
          vnet_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          vnet_address_space: ${{ secrets.VNET_ADDRESS_SPACE }}
          bastion_subnet_address_prefix: ${{ secrets.BASTION_SUBNET_ADDRESS_PREFIX }}
          jumpbox_subnet_address_prefix: ${{ secrets.JUMPBOX_SUBNET_ADDRESS_PREFIX }}

          # Comma-separated Entra object IDs (users or groups) allowed to log in to the jumpbox.
          # Use a group ID so access is managed in Entra, not in CI secrets.
          vm_admin_login_principal_ids: ${{ secrets.VM_ADMIN_LOGIN_PRINCIPAL_IDS }}
          vm_size: Standard_B2als_v2
          bastion_sku: Standard
          enable_bastion: true
          enable_jumpbox: true
          enable_bastion_automation: true
          enable_monitoring: false