name: Deploy VM + Bastion (ALZ)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (must match a GitHub Environment + OIDC federated credential)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
          - tools
      terraform_command:
        description: 'Terraform command to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read

jobs:
  deploy:
    name: Deploy Bastion + Jumpbox (${{ inputs.environment }})
    runs-on: ubuntu-24.04
    # Environment must be set on the JOB so environment-scoped secrets resolve
    # and OIDC trusts the job with subject: repo:...:environment:<env>
    environment: ${{ inputs.environment }}
    steps:
      # Required so the action can read tfvars_file from this repo
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Preflight RBAC check for apply/destroy
        if: ${{ inputs.terraform_command != 'plan' }}
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          TARGET_VNET_RG: ${{ vars.VNET_RESOURCE_GROUP_NAME || vars.RESOURCE_GROUP_NAME }}
        run: |
          set -euo pipefail

          SP_OBJECT_ID="$(az ad sp show --id "${AZURE_CLIENT_ID}" --query id -o tsv)"
          SUB_SCOPE="/subscriptions/${AZURE_SUBSCRIPTION_ID}"
          VNET_RG_SCOPE="${SUB_SCOPE}/resourceGroups/${TARGET_VNET_RG}"

          has_uaa_or_owner="$(az role assignment list \
            --assignee-object-id "${SP_OBJECT_ID}" \
            --scope "${SUB_SCOPE}" \
            --query "[?roleDefinitionName=='Owner' || roleDefinitionName=='User Access Administrator'] | length(@)" \
            -o tsv)"

          has_network_contributor="$(az role assignment list \
            --assignee-object-id "${SP_OBJECT_ID}" \
            --scope "${VNET_RG_SCOPE}" \
            --query "[?roleDefinitionName=='Network Contributor' || roleDefinitionName=='Contributor' || roleDefinitionName=='Owner'] | length(@)" \
            -o tsv)"

          if [ "${has_uaa_or_owner}" -eq 0 ]; then
            echo "::error::Missing RBAC: service principal must have Owner or User Access Administrator on ${SUB_SCOPE} to create role assignments."
            exit 1
          fi

          if [ "${has_network_contributor}" -eq 0 ]; then
            echo "::error::Missing RBAC: service principal must have Network Contributor (or Contributor/Owner) on ${VNET_RG_SCOPE}."
            exit 1
          fi

      - uses: bcgov/action-deployer-vm-bastion-alz@b7053b77b6030a98909ad12182f588ad4302c0a2
        with:
          app_name: nr-ai-form
          app_env: ${{ inputs.environment }}
          terraform_command: ${{ inputs.terraform_command }}

          # Load non-sensitive config (jumpbox_subnet_name, vm_size, bastion_sku, etc.)
          # This ensures jumpbox_subnet_name is unique per namespace per ALZ constraint
          tfvars_file: ./config/nr-ai-form-bastion.tfvars

          # Keep Bastion resources isolated from existing app resource groups/state
          resource_group_name: nr-ai-form-bastion-${{ inputs.environment }}

          backend_storage_account: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          backend_state_key: nr-ai-form/bastion/${{ inputs.environment }}/terraform.tfstate

          # Azure OIDC identity (environment-scoped secrets)
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Network details — always passed from secrets, never plain text
          vnet_name: ${{ vars.VNET_NAME }}
          vnet_resource_group_name: ${{ vars.VNET_RESOURCE_GROUP_NAME || vars.RESOURCE_GROUP_NAME }}
          vnet_address_space: ${{ vars.VNET_ADDRESS_SPACE }}
          bastion_subnet_address_prefix: ${{ secrets.BASTION_SUBNET_ADDRESS_PREFIX }}
          jumpbox_subnet_address_prefix: ${{ secrets.JUMPBOX_SUBNET_ADDRESS_PREFIX }}

          # Comma-separated Entra object IDs (users or groups) allowed to log in to the jumpbox.
          # Use a group ID so access is managed in Entra, not in CI secrets.
          vm_admin_login_principal_ids: ${{ secrets.VM_ADMIN_LOGIN_PRINCIPAL_IDS }}
          vm_size: Standard_B2als_v2
          bastion_sku: Standard
          enable_bastion: true
          enable_jumpbox: true
          enable_bastion_automation: true
          enable_monitoring: false