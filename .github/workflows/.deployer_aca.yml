name: .Terraform ACA Deployer

on:
  workflow_call:
    inputs:
      ### Required
      environment_name:
        description: 'The name of the environment to deploy to'
        required: true
        default: 'dev'
        type: string
      command:
        description: 'The terragrunt command to run'
        required: true
        default: 'apply'
        type: string
      tag:
        description: 'The tag of the containers to deploy'
        default: 'latest'
        type: string
        required: false
      app_env:
        required: false
        type: string
        description: 'The APP env separates between Azure ENV and Actual APP, since Azure dev is where PR, and TEST is deployed'
      stack_prefix:
        required: true
        type: string
        description: 'The stack prefix to use for the resources'
      deployment_type:
        required: false
        type: string
        default: 'container_apps'
        description: 'The deployment type: container_apps (App Service deployment is no longer supported)'
      prevent_destroy:
        required: false
        type: boolean
        default: false
        description: 'When true, runs a plan before apply and aborts if any resources would be destroyed or replaced'
      target_modules:
        required: false
        type: string
        default: ''
        description: 'Space-separated list of -target=<module> flags to scope the Terraform operation (e.g. "-target=module.container_apps")'
      branch_slug:
        required: false
        type: string
        default: 'master'
        description: 'URL-safe slug of the deploying branch; appended to the ACA Container App name (dev only)'

env:
    TG_VERSION: 0.63.6
    TF_VERSION: 1.12.2
    TF_LOG: ERROR
    AZURE_REGION: Canada Central
permissions:
  id-token: write # This is required for requesting the JWT
  contents: write # This is required for actions/checkout
jobs:
 infra:
  name: Terragrunt ${{inputs.command}} ACA ${{ inputs.environment_name }}
  runs-on: ubuntu-24.04
  environment: ${{ inputs.environment_name }}
  steps:
    
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Azure CLI Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }} 
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    
    # Using commit SHA instead of version tag for reproducibility and security.
    # SHA is immutable - guarantees exact same code runs every deployment.
    # Version tags can be updated by maintainers, risking unexpected breaking changes.
    - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    # Using commit SHA instead of version tag for reproducibility and security.
    # SHA is immutable - guarantees exact same code runs every deployment.
    # Version tags can be updated by maintainers, risking unexpected breaking changes.
    - name: Setup Terragrunt
      uses: autero1/action-terragrunt@aefb0a43c4f5503a91fefb307745c4d51c26ed0e # v3
      with:
        terragrunt-version: ${{ env.TG_VERSION }}
    
    - name: Pre-Migration State Cleanup
      working-directory: terragrunt/${{ inputs.environment_name }}
      env:
          target_env: ${{ inputs.environment_name }}
          azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          vnet_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
          vnet_name: ${{ vars.VNET_NAME }}
          api_image: "ghcr.io/${{ github.repository }}/agentic_ai_backend:${{ inputs.tag }}"
          orchestrator_agent_image: "ghcr.io/${{ github.repository }}/orchestrator_agent:${{ inputs.tag }}"
          conversation_agent_image: "ghcr.io/${{ github.repository }}/conversation_agent:${{ inputs.tag }}"
          formsupport_agent_image: "ghcr.io/${{ github.repository }}/formsupport_agent:${{ inputs.tag }}"
          # api_backend_image: "ghcr.io/${{ github.repository }}/api_backend:${{ inputs.tag }}"
          stack_prefix: ${{ inputs.stack_prefix }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          repo_name: ${{ github.event.repository.name }}
          app_env: ${{ inputs.app_env }}
          branch_slug: ${{ inputs.branch_slug }}
          storage_account_name: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          vnet_address_space: ${{ vars.VNET_ADDRESS_SPACE }}
          deployment_type: ${{ inputs.deployment_type }}
          # Azure OpenAI Configuration
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEPLOYMENT_NAME: ${{ vars.AZURE_OPENAI_CHAT_DEPLOYMENT_NAME }}
          # Azure Search Configuration
          AZURE_SEARCH_ENDPOINT: ${{ vars.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ vars.AZURE_SEARCH_INDEX_NAME }}
          # Azure Document Intelligence Configuration
          AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ vars.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}
          AZURE_DOCUMENT_INTELLIGENCE_KEY: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY }}
          # Azure Storage Configuration
          AZURE_STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          AZURE_STORAGE_CONTAINER_NAME: ${{ vars.AZURE_STORAGE_CONTAINER_NAME }}
          # Azure Blob Storage Configuration
          AZURE_BLOBSTORAGE_CONNECTIONSTRING: ${{ vars.AZURE_BLOBSTORAGE_CONNECTIONSTRING || '' }}
          AZURE_BLOBSTORAGE_CONTAINER: ${{ vars.AZURE_BLOBSTORAGE_CONTAINER || '' }}
          # Redis Configuration
          REDIS_HOST: ${{ vars.REDIS_HOST }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_SSL: ${{ vars.REDIS_SSL }}
          REDIS_TTL_DAYS: ${{ vars.REDIS_TTL_DAYS }}
      run: bash ${{ github.workspace }}/scripts/state-prep.sh


    - name: Image Tags
      id: image-tags
      shell: bash
      run: |
        # Build full registry URLs for agent images
        ORCHESTRATOR_AGENT_IMAGE="ghcr.io/${{ github.repository }}/orchestrator_agent:${{ inputs.tag }}"
        CONVERSATION_AGENT_IMAGE="ghcr.io/${{ github.repository }}/conversation_agent:${{ inputs.tag }}"
        FORMSUPPORT_AGENT_IMAGE="ghcr.io/${{ github.repository }}/formsupport_agent:${{ inputs.tag }}"
        # API_IMAGE="ghcr.io/${{ github.repository }}/agentic_ai_backend:${{ inputs.tag }}"
        # API_BACKEND_IMAGE="ghcr.io/${{ github.repository }}/api_backend:${{ inputs.tag }}"

        echo "orchestrator-agent-image=$ORCHESTRATOR_AGENT_IMAGE" >> $GITHUB_OUTPUT
        echo "conversation-agent-image=$CONVERSATION_AGENT_IMAGE" >> $GITHUB_OUTPUT
        echo "formsupport-agent-image=$FORMSUPPORT_AGENT_IMAGE" >> $GITHUB_OUTPUT
        # echo "api-image=$API_IMAGE" >> $GITHUB_OUTPUT
        # echo "api-backend-image=$API_BACKEND_IMAGE" >> $GITHUB_OUTPUT

    - name: Safety Plan Check
      if: inputs.prevent_destroy == true && inputs.command == 'apply'
      working-directory: terragrunt/${{ inputs.environment_name }}
      env:
          target_env: ${{ inputs.environment_name }}
          azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          vnet_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
          vnet_name: ${{ vars.VNET_NAME }}
          api_image: ${{ steps.image-tags.outputs.api-image }}
          orchestrator_agent_image: ${{ steps.image-tags.outputs.orchestrator-agent-image }}
          conversation_agent_image: ${{ steps.image-tags.outputs.conversation-agent-image }}
          formsupport_agent_image: ${{ steps.image-tags.outputs.formsupport-agent-image }}
          # api_backend_image: ${{ steps.image-tags.outputs.api-backend-image }}
          stack_prefix: ${{ inputs.stack_prefix }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          repo_name: ${{ github.event.repository.name }}
          app_env: ${{ inputs.app_env }}
          branch_slug: ${{ inputs.branch_slug }}
          storage_account_name: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          vnet_address_space: ${{ vars.VNET_ADDRESS_SPACE }}
          deployment_type: ${{ inputs.deployment_type }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEPLOYMENT_NAME: ${{ vars.AZURE_OPENAI_CHAT_DEPLOYMENT_NAME }}
          AZURE_SEARCH_ENDPOINT: ${{ vars.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ vars.AZURE_SEARCH_INDEX_NAME }}
          AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ vars.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}
          AZURE_DOCUMENT_INTELLIGENCE_KEY: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          AZURE_STORAGE_CONTAINER_NAME: ${{ vars.AZURE_STORAGE_CONTAINER_NAME }}
          AZURE_BLOBSTORAGE_CONNECTIONSTRING: ${{ vars.AZURE_BLOBSTORAGE_CONNECTIONSTRING || '' }}
          AZURE_BLOBSTORAGE_CONTAINER: ${{ vars.AZURE_BLOBSTORAGE_CONTAINER || '' }}
          # Redis Configuration
          REDIS_HOST: ${{ vars.REDIS_HOST }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_SSL: ${{ vars.REDIS_SSL }}
          REDIS_TTL_DAYS: ${{ vars.REDIS_TTL_DAYS }}
      run: |
          echo "Running plan to check for resource destructions..."
          terragrunt run-all plan --terragrunt-non-interactive -lock=false ${{ inputs.target_modules }} 2>&1 | tee /tmp/tfplan_output.txt

          if grep -E "(will be destroyed|must be replaced)" /tmp/tfplan_output.txt; then
            echo "::error::Plan contains resource destructions or replacements. Aborting to protect the ${{ inputs.environment_name }} environment."
            echo "Review the plan output above. If the destruction is intentional, use a destroy workflow instead."
            exit 1
          fi
          echo "Safety check passed: no resource destructions detected."

    - name: Terragrunt ${{inputs.command}}
      working-directory: terragrunt/${{ inputs.environment_name }}
      env:
          target_env: ${{ inputs.environment_name }}
          azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          vnet_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
          vnet_name: ${{ vars.VNET_NAME }}
          api_image: ${{ steps.image-tags.outputs.api-image }}
          orchestrator_agent_image: ${{ steps.image-tags.outputs.orchestrator-agent-image }}
          conversation_agent_image: ${{ steps.image-tags.outputs.conversation-agent-image }}
          formsupport_agent_image: ${{ steps.image-tags.outputs.formsupport-agent-image }}
          # api_backend_image: ${{ steps.image-tags.outputs.api-backend-image }}
          stack_prefix: ${{ inputs.stack_prefix }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          repo_name: ${{ github.event.repository.name }}
          app_env: ${{ inputs.app_env }}
          branch_slug: ${{ inputs.branch_slug }}
          storage_account_name: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          vnet_address_space: ${{ vars.VNET_ADDRESS_SPACE }}
          deployment_type: ${{ inputs.deployment_type }}
          # Azure OpenAI Configuration
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEPLOYMENT_NAME: ${{ vars.AZURE_OPENAI_CHAT_DEPLOYMENT_NAME }}
          # Azure Search Configuration
          AZURE_SEARCH_ENDPOINT: ${{ vars.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ vars.AZURE_SEARCH_INDEX_NAME }}
          # Azure Document Intelligence Configuration
          AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ vars.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}
          AZURE_DOCUMENT_INTELLIGENCE_KEY: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY }}
          # Azure Storage Configuration
          AZURE_STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          AZURE_STORAGE_CONTAINER_NAME: ${{ vars.AZURE_STORAGE_CONTAINER_NAME }}
          # Azure Blob Storage Configuration
          AZURE_BLOBSTORAGE_CONNECTIONSTRING: ${{ vars.AZURE_BLOBSTORAGE_CONNECTIONSTRING || '' }}
          AZURE_BLOBSTORAGE_CONTAINER: ${{ vars.AZURE_BLOBSTORAGE_CONTAINER || '' }}
          # Redis Configuration
          REDIS_HOST: ${{ vars.REDIS_HOST }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_SSL: ${{ vars.REDIS_SSL }}
          REDIS_TTL_DAYS: ${{ vars.REDIS_TTL_DAYS }}
      run: |
          # Run terraform with lock=false to avoid state lock issues
          terragrunt run-all ${{inputs.command}} --terragrunt-non-interactive -lock=false ${{ inputs.target_modules }}
