name: Deploy ACA to Dev

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Run "plan" to preview changes safely, then re-run with "apply" to deploy'
        required: false
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  # Builds only run on apply — plan does not need new images
  builds:
    if: inputs.command == 'apply'
    concurrency:
      group: builds-aca-dev-${{ github.run_id }}
      cancel-in-progress: true
    uses: ./.github/workflows/.builds.yml
    with:
      tags: |
        latest
        dev-aca

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        name: Cache plugin dir
        with:
          path: ~/.tflint.d/plugins
          key: ubuntu-tflint-${{ hashFiles('.tflint.hcl') }}

      - uses: terraform-linters/setup-tflint@v4
        name: Setup TFLint
        with:
          tflint_version: v0.52.0

      - name: Show version
        run: tflint --version

      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint -f compact

  deploy-aca-dev:
    name: ${{ inputs.command == 'plan' && 'Plan' || 'Deploy' }} Azure Container Apps to Dev
    needs: builds
    # Run even when builds was skipped (plan path) but not when builds failed
    if: always() && (needs.builds.result == 'success' || needs.builds.result == 'skipped')
    concurrency:
      group: deploy-aca-dev-${{ github.run_id }}
      cancel-in-progress: false
    uses: ./.github/workflows/.deploy_aca_stack.yml
    with:
      command: ${{ inputs.command }}
      tag: dev-aca
      app_env: dev
      environment_name: dev
      deployment_type: container_apps
      prevent_destroy: true
    secrets: inherit
