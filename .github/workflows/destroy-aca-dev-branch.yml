name: Destroy ACA Dev Branch

# Triggered automatically when a branch is deleted or a PR is merged into master.
# Only destroys the Container App for that specific branch (not the shared environment).
#
# IMPORTANT: The Container App Environment is SHARED across all branch deployments.
# This workflow scopes the destroy to '-target=module.container_apps.azurerm_container_app.backend'
# so that the environment (and all other shared infrastructure) is preserved.

on:
  # Auto-trigger when a branch is deleted (merged or manually deleted)
  delete:

  # Also trigger when a PR is merged, in case the branch survives deletion briefly
  pull_request:
    branches: [master]
    types: [closed]

  # Manual fallback: destroy any branch by name
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name whose ACA should be destroyed (e.g. feature/my-branch)'
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  # Only run on branch deletes (not tag deletes) or on merged PRs
  check:
    name: Check Trigger
    runs-on: ubuntu-24.04
    outputs:
      should_destroy: ${{ steps.check.outputs.should_destroy }}
      branch_name: ${{ steps.check.outputs.branch_name }}
    steps:
      - name: Determine if destroy should run
        id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "delete" ]; then
            # Only act on branch deletions, not tags
            if [ "${{ github.event.ref_type }}" == "branch" ]; then
              echo "should_destroy=true" >> $GITHUB_OUTPUT
              echo "branch_name=${{ github.event.ref }}" >> $GITHUB_OUTPUT
            else
              echo "should_destroy=false" >> $GITHUB_OUTPUT
              echo "branch_name=" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            # Only destroy when the PR was actually merged (not just closed)
            if [ "${{ github.event.pull_request.merged }}" == "true" ]; then
              echo "should_destroy=true" >> $GITHUB_OUTPUT
              echo "branch_name=${{ github.head_ref }}" >> $GITHUB_OUTPUT
            else
              echo "should_destroy=false" >> $GITHUB_OUTPUT
              echo "branch_name=" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_destroy=true" >> $GITHUB_OUTPUT
            echo "branch_name=${{ inputs.branch_name }}" >> $GITHUB_OUTPUT
          else
            echo "should_destroy=false" >> $GITHUB_OUTPUT
            echo "branch_name=" >> $GITHUB_OUTPUT
          fi

  branch-slug:
    name: Branch Slug
    needs: check
    if: needs.check.outputs.should_destroy == 'true'
    runs-on: ubuntu-24.04
    outputs:
      branch_slug: ${{ steps.slug.outputs.branch_slug }}
    steps:
      - name: Compute branch slug
        id: slug
        shell: bash
        run: |
          branch="${{ needs.check.outputs.branch_name }}"
          slug=$(echo "$branch" | tr '[:upper:]' '[:lower:]' | sed 's|/|-|g' | \
                 sed 's/[^a-z0-9-]/-/g' | sed 's/-\{2,\}/-/g' | sed 's/^-//;s/-$//')
          slug="${slug:0:15}"
          slug=$(echo "$slug" | sed 's/-$//')
          echo "branch_slug=$slug" >> $GITHUB_OUTPUT
          echo "Destroying ACA for branch: $branch (slug: $slug)"

  stack-prefix:
    name: Stack Prefix
    needs: check
    if: needs.check.outputs.should_destroy == 'true'
    uses: ./.github/workflows/.stack-prefix.yml

  destroy:
    name: Destroy ACA for branch ${{ needs.check.outputs.branch_name }}
    needs: [check, branch-slug, stack-prefix]
    if: needs.check.outputs.should_destroy == 'true'
    uses: ./.github/workflows/.deployer_aca.yml
    with:
      environment_name: dev
      command: destroy
      stack_prefix: ${{ needs.stack-prefix.outputs.STACK_PREFIX }}
      app_env: dev
      deployment_type: container_apps
      branch_slug: ${{ needs.branch-slug.outputs.branch_slug }}
      # Only destroy the branch-specific Container App — preserve the shared environment
      target_modules: '-target=module.container_apps.azurerm_container_app.backend'
    secrets: inherit
