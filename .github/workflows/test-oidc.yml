name: Test OIDC Login

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: 'Environment to test (dev/test)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test

permissions:
  id-token: write # Required for OIDC token
  contents: read

jobs:
  test-login:
    name: Test Azure OIDC - ${{ inputs.environment_name }}
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment_name }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Debug - Show OIDC Token Claims (before login)
        run: |
          echo "=========================================="
          echo "GitHub OIDC Context"
          echo "=========================================="
          echo "Environment: ${{ github.environment }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo ""
          echo "Expected OIDC subject claim:"
          echo "  repo:bcgov/nr-ai-form:environment:${{ inputs.environment_name }}"
          echo ""
      
      - name: Debug - Show Secrets/Vars
        run: |
          echo "=========================================="
          echo "Configuration Values"
          echo "=========================================="
          echo "AZURE_CLIENT_ID (secret): ${{ secrets.AZURE_CLIENT_ID != '' && '✅ Set' || '❌ NOT SET' }}"
          echo "AZURE_TENANT_ID (secret): ${{ secrets.AZURE_TENANT_ID != '' && '✅ Set' || '❌ NOT SET' }}"
          echo "AZURE_SUBSCRIPTION_ID (secret): ${{ secrets.AZURE_SUBSCRIPTION_ID != '' && '✅ Set' || '❌ NOT SET' }}"
          echo ""
          echo "AZURE_CLIENT_ID (var): ${{ vars.AZURE_CLIENT_ID != '' && '✅ Set' || '❌ NOT SET' }}"
          echo "AZURE_SUBSCRIPTION_ID (var): ${{ vars.AZURE_SUBSCRIPTION_ID != '' && '✅ Set' || '❌ NOT SET' }}"
          echo ""
      
      - name: Azure CLI Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Verify Login Success
        run: |
          echo "=========================================="
          echo "✅ Azure Login Successful!"
          echo "=========================================="
          echo ""
          echo "Account Details:"
          az account show --output table
          echo ""
          echo "Subscription Info:"
          az account show --query "{TenantId:tenantId, SubscriptionId:id, SubscriptionName:name}" -o table
          echo ""
          echo "✅ OIDC authentication test PASSED for environment: ${{ inputs.environment_name }}"
      
      - name: Test Azure Resource Access
        run: |
          echo "=========================================="
          echo "Testing Azure Resource Access"
          echo "=========================================="
          echo ""
          echo "Listing resource groups (first 5):"
          az group list --query "[].{Name:name, Location:location}" -o table | head -n 6
          echo ""
          echo "✅ Resource access test PASSED"
